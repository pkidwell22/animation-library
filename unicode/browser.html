<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animation Library Browser</title>
<style>
  :root {
    --bg: #1a1a1a; --panel: #242424; --border: #333; --text: #d4d4d4;
    --muted: #777; --accent: #5b9dd9; --hermes-think: #c586c0; --hermes-tool: #569cd6;
    --hover: #2a2a2a; --rb-text: #c586c0; --rb-anim: #569cd6; --rb-comp: #b5cea8; --rb-bg: #dcdcaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; min-height: 100vh; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .sub a { color: var(--accent); }
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab { padding: 8px 16px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: color 0.1s, border-color 0.1s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-count { font-size: 10px; background: var(--border); padding: 1px 5px; border-radius: 8px; margin-left: 6px; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls input[type="text"] { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 3px; font-size: 13px; width: 200px; outline: none; }
  .controls input:focus { border-color: var(--accent); }
  .controls select { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 3px; font-size: 13px; cursor: pointer; }
  .controls label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .card { background: var(--panel); padding: 16px; display: flex; flex-direction: column; gap: 8px; transition: background 0.1s; }
  .card:hover { background: var(--hover); }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .card-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; font-weight: 600; }
  .card-badges { display: flex; gap: 4px; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .badge-think { background: rgba(197,134,192,0.2); color: var(--hermes-think); }
  .badge-tool { background: rgba(86,156,214,0.2); color: var(--hermes-tool); }
  .badge-native { background: rgba(181,206,168,0.2); color: var(--rb-comp); }
  .badge-rb { background: rgba(220,220,170,0.15); color: var(--rb-bg); }
  .spinner-display { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 28px; line-height: 1; min-height: 60px; display: flex; align-items: center; justify-content: center; background: #1a1a1a; border: 1px solid var(--border); border-radius: 3px; padding: 8px; color: var(--accent); }
  .card-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .card-desc { font-size: 11px; color: var(--muted); line-height: 1.3; min-height: 14px; }
  .preview-line { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--text); min-height: 18px; display: flex; align-items: center; gap: 6px; }
  .preview-line .spinner-inline { color: var(--accent); }
  .rb-link { color: var(--accent); text-decoration: none; font-size: 11px; }
  .rb-link:hover { text-decoration: underline; }
  .section-header { font-size: 12px; font-weight: 600; color: var(--text); padding: 12px 16px 8px; background: var(--panel); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
  .rb-note { padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .rb-note a { color: var(--accent); }
</style>
</head>
<body>
  <h1>Animation Library Browser</h1>
  <div class="sub">
    <span id="totalCount"></span> animations — unicode spinners, native SwiftUI loaders, and React Bits components.
    <a href="https://github.com/pkidwell22/animation-library" style="color:var(--accent)">View repo →</a>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="unicode">Unicode Spinners <span class="tab-count">18</span></button>
    <button class="tab" data-tab="native">Native Loaders <span class="tab-count">9</span></button>
    <button class="tab" data-tab="reactbits">React Bits <span class="tab-count">134</span></button>
    <button class="tab" data-tab="all">All <span class="tab-count">161</span></button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Filter by name..." autocomplete="off">
    <select id="filter">
      <option value="all">All categories</option>
      <option value="think">Hermes: thinking</option>
      <option value="tool">Hermes: tool</option>
      <option value="native">Native</option>
      <option value="TextAnimations">React Bits: Text</option>
      <option value="Animations">React Bits: Animations</option>
      <option value="Components">React Bits: Components</option>
      <option value="Backgrounds">React Bits: Backgrounds</option>
      <option value="other">Other</option>
    </select>
    <label><input type="checkbox" id="showPreview" checked> Inline preview</label>
  </div>

  <div class="grid" id="grid"></div>
  <div id="rbNote"></div>

<style id="dynamicCss"></style>

const HERMES_THINK = ["helix", "breathe", "orbit", "dna", "waverows", "snake", "pulse"];
const HERMES_TOOL = ["cascade", "scan", "diagswipe", "fillsweep", "rain", "columns", "sparkle"];

const RB_COLORS = { TextAnimations: "var(--rb-text)", Animations: "var(--rb-anim)", Components: "var(--rb-comp)", Backgrounds: "var(--rb-bg)" };

function getUnicodeCategory(name) {
  if (HERMES_THINK.includes(name)) return 'think';
  if (HERMES_TOOL.includes(name)) return 'tool';
  return 'other';
}

let currentTab = 'unicode';
let spinnerIntervals = [];

function clearIntervals() {
  spinnerIntervals.forEach(id => clearInterval(id));
  spinnerIntervals = [];
}

function buildCards() {
  clearIntervals();
  const grid = document.getElementById('grid');
  const rbNote = document.getElementById('rbNote');
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  const showPreview = document.getElementById('showPreview').checked;
  const dynCss = document.getElementById('dynamicCss');

  grid.innerHTML = '';
  dynCss.innerHTML = '';
  rbNote.innerHTML = '';

  let items = [];

  if (currentTab === 'unicode' || currentTab === 'all') {
    for (const [name, info] of Object.entries(SPINNERS)) {
      const cat = getUnicodeCategory(name);
      items.push({ name, type: 'unicode', cat, info });
    }
  }

  if (currentTab === 'native' || currentTab === 'all') {
    for (const [name, info] of Object.entries(NATIVE_LOADERS)) {
      items.push({ name, type: 'native', cat: 'native', info });
    }
  }

  if (currentTab === 'reactbits' || currentTab === 'all') {
    for (const [catName, comps] of Object.entries(REACT_BITS)) {
      for (const comp of comps) {
        items.push({ name: comp.name, type: 'reactbits', cat: catName, info: comp, desc: comp.desc || '' });
      }
    }
  }

  // Filter
  items = items.filter(item => {
    if (!item.name.toLowerCase().includes(search)) return false;
    if (filter === 'all') return true;
    return item.cat === filter;
  });

  // React Bits note
  if (currentTab === 'reactbits') {
    rbNote.innerHTML = `<div class="rb-note">React Bits components are React/TypeScript — browse and copy them at <a href="https://reactbits.dev" target="_blank">reactbits.dev</a>. Source: <a href="https://github.com/DavidHDev/react-bits" target="_blank">DavidHDev/react-bits</a> (MIT + Commons Clause). 4 variants per component: JS-CSS, JS-TW, TS-CSS, TS-TW.</div>`;
  }

  // Render
  for (const item of items) {
    const card = document.createElement('div');
    card.className = 'card';

    let badges = '';
    if (item.cat === 'think') badges = '<span class="badge badge-think">thinking</span>';
    else if (item.cat === 'tool') badges = '<span class="badge badge-tool">tool</span>';
    else if (item.cat === 'native') badges = '<span class="badge badge-native">native</span>';
    else if (item.type === 'reactbits') badges = `<span class="badge badge-rb">${item.cat}</span>`;

    if (item.type === 'unicode') {
      const info = item.info;
      card.innerHTML = `
        <div class="card-header"><span class="card-name">${item.name}</span><div class="card-badges">${badges}</div></div>
        <div class="spinner-display" data-spinner="${item.name}"></div>
        <div class="card-meta"><span>${info.frames.length} frames</span><span>${info.interval}ms</span></div>
        ${showPreview ? `<div class="preview-line" data-preview="${item.name}"><span class="spinner-inline"></span> Generating assets...</div>` : ''}
      `;
      grid.appendChild(card);

      let frame = 0;
      const display = card.querySelector('[data-spinner]');
      const preview = card.querySelector('[data-preview] .spinner-inline');
      const id = setInterval(() => {
        const f = info.frames[frame % info.frames.length];
        if (display) display.textContent = f;
        if (preview) preview.textContent = f;
        frame++;
      }, info.interval);
      spinnerIntervals.push(id);

    } else if (item.type === 'native') {
      const info = item.info;
      dynCss.innerHTML += info.css;
      card.innerHTML = `
        <div class="card-header"><span class="card-name">${item.name}</span><div class="card-badges">${badges}</div></div>
        <div class="spinner-display">${info.html}</div>
        <div class="card-meta"><span>native SwiftUI</span><span>CSS equiv.</span></div>
        ${showPreview ? `<div class="preview-line"><span style="color:var(--accent)">${info.html}</span> Generating assets...</div>` : ''}
      `;
      grid.appendChild(card);

    } else if (item.type === 'reactbits') {
      const slug = item.name;
      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${item.name}</span>
          <div class="card-badges">${badges}</div>
        </div>
        <div class="card-desc">${item.desc || 'React component'}</div>
        <div class="card-meta">
          <span>react + ts</span>
          <a class="rb-link" href="https://reactbits.dev" target="_blank">view →</a>
        </div>
      `;
      grid.appendChild(card);
    }
  }

  // Update count
  document.getElementById('totalCount').textContent = items.length;
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    if (currentTab === 'native') document.getElementById('filter').value = 'native';
    else if (currentTab === 'reactbits') document.getElementById('filter').value = 'TextAnimations';
    else document.getElementById('filter').value = 'all';
    buildCards();
  });
});

document.getElementById('search').addEventListener('input', buildCards);
document.getElementById('filter').addEventListener('change', buildCards);
document.getElementById('showPreview').addEventListener('change', buildCards);
buildCards();
</script>
