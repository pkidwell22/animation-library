<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animation Library Browser</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --border: #333;
    --text: #d4d4d4;
    --muted: #777;
    --accent: #5b9dd9;
    --hermes-think: #c586c0;
    --hermes-tool: #569cd6;
    --hover: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .sub a { color: var(--accent); }
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: color 0.1s, border-color 0.1s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-count {
    font-size: 10px;
    background: var(--border);
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 6px;
  }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input[type="text"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  .controls input:focus { border-color: var(--accent); }
  .controls select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 13px;
    cursor: pointer;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .card {
    background: var(--panel);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.1s;
  }
  .card:hover { background: var(--hover); }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .card-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; font-weight: 600; }
  .card-badges { display: flex; gap: 4px; }
  .badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .badge-think { background: rgba(197,134,192,0.2); color: var(--hermes-think); }
  .badge-tool { background: rgba(86,156,214,0.2); color: var(--hermes-tool); }
  .badge-native { background: rgba(181,206,168,0.2); color: #b5cea8; }
  .spinner-display {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 28px;
    line-height: 1;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px;
    color: var(--accent);
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .preview-line {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--text);
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preview-line .spinner-inline { color: var(--accent); }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <h1>Animation Library Browser</h1>
  <div class="sub">
    <span id="totalCount"></span> animations across unicode spinners and native SwiftUI loaders.
    <a href="https://github.com/pkidwell22/animation-library" style="color:var(--accent)">View repo вҶ’</a>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="unicode">Unicode Spinners <span class="tab-count">18</span></button>
    <button class="tab" data-tab="native">Native Loaders <span class="tab-count">9</span></button>
    <button class="tab" data-tab="all">All <span class="tab-count">27</span></button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Filter by name..." autocomplete="off">
    <select id="filter">
      <option value="all">All categories</option>
      <option value="think">Hermes: thinking</option>
      <option value="tool">Hermes: tool</option>
      <option value="native">Native</option>
      <option value="other">Other</option>
    </select>
    <label><input type="checkbox" id="showPreview" checked> Inline preview</label>
  </div>

  <div class="grid" id="grid"></div>

<!-- Dynamic CSS injection container -->
<style id="dynamicCss"></style>

<script>
const SPINNERS = {
  "braille": { frames: ["в Ӣ", "в ҷ", "в №", "в ё", "в ј", "в ҙ", "в Ұ", "в §", "в Ү", "в Ҹ"], interval: 80 },
  "braillewave": { frames: ["в Ғв Ӯв „вЎҖ", "в Ӯв „вЎҖвўҖ", "в „вЎҖвўҖв  ", "вЎҖвўҖв  в җ", "вўҖв  в җв Ҳ", "в  в җв Ҳв Ғ", "в җв Ҳв Ғв Ӯ", "в Ҳв Ғв Ӯв „"], interval: 100 },

  "scan": { frames: ["в Җв Җв Җв Җ", "вЎҮв Җв Җв Җ", "вЈҝв Җв Җв Җ", "вўёвЎҮв Җв Җ", "в ҖвЈҝв Җв Җ", "в ҖвўёвЎҮв Җ", "в Җв ҖвЈҝв Җ", "в Җв ҖвўёвЎҮ", "в Җв Җв ҖвЈҝ", "в Җв Җв Җвўё"], interval: 70 },
  "rain": { frames: ["вўҒв Ӯв ”в Ҳ", "в Ӯв ҢвЎ в җ", "в „вЎҗвўҖв Ў", "вЎҲв  в ҖвўӮ", "в җвўҖв Ғв „", "в  в Ғв ҠвЎҖ", "вўҒв Ӯв ”в Ҳ", "в Ӯв ҢвЎ в җ", "в „вЎҗвўҖв Ў", "вЎҲв  в ҖвўӮ", "в җвўҖв Ғв „", "в  в Ғв ҠвЎҖ"], interval: 100 },
  "scanline": { frames: ["в үв үв ү", "в “в “в “", "в Ұв Ұв Ұ", "вЈ„вЈ„вЈ„", "в Ұв Ұв Ұ", "в “в “в “"], interval: 120 },
  "pulse": { frames: ["в Җв ¶в Җ", "в °вЈҝв Ҷ", "вўҫвЈүвЎ·", "вЈҸв ҖвЈ№", "вЎҒв ҖвўҲ"], interval: 180 },
  "snake": { frames: ["вЈҒвЎҖ", "вЈүв Җ", "вЎүв Ғ", "в үв ү", "в Ҳв ҷ", "в Җв ӣ", "в җв ҡ", "в ’в ’", "в –в Ӯ", "в ¶в Җ", "в Ұв „", "в Өв Ө", "в  вўӨ", "в ҖвЈӨ", "вўҖвЈ ", "вЈҖвЈҖ"], interval: 80 },
  "sparkle": { frames: ["вЎЎв Ҡвў”в Ў", "в ҠвЎ°вЎЎвЎҳ", "вў”вў…в Ҳвўў", "вЎҒвўӮв ҶвЎҚ", "вў”в Ёвў‘вўҗ", "в ЁвЎ‘вЎ в Ҡ"], interval: 150 },
  "cascade": { frames: ["в Җв Җв Җв Җ", "в Җв Җв Җв Җ", "в Ғв Җв Җв Җ", "в Ӣв Җв Җв Җ", "в һв Ғв Җв Җ", "вЎҙв Ӣв Җв Җ", "вЈ в һв Ғв Җ", "вўҖвЎҙв Ӣв Җ", "в ҖвЈ в һв Ғ", "в ҖвўҖвЎҙв Ӣ", "в Җв ҖвЈ в һ", "в Җв ҖвўҖвЎҙ", "в Җв Җв ҖвЈ ", "в Җв Җв ҖвўҖ"], interval: 60 },
  "columns": { frames: ["вЎҖв Җв Җ", "вЎ„в Җв Җ", "вЎҶв Җв Җ", "вЎҮв Җв Җ", "вЈҮв Җв Җ", "вЈ§в Җв Җ", "вЈ·в Җв Җ", "вЈҝв Җв Җ", "вЈҝвЎҖв Җ", "вЈҝвЎ„в Җ", "вЈҝвЎҶв Җ", "вЈҝвЎҮв Җ", "вЈҝвЈҮв Җ", "вЈҝвЈ§в Җ", "вЈҝвЈ·в Җ", "вЈҝвЈҝв Җ", "вЈҝвЈҝвЎҖ", "вЈҝвЈҝвЎ„", "вЈҝвЈҝвЎҶ", "вЈҝвЈҝвЎҮ", "вЈҝвЈҝвЈҮ", "вЈҝвЈҝвЈ§", "вЈҝвЈҝвЈ·", "вЈҝвЈҝвЈҝ", "вЈҝвЈҝвЈҝ", "в Җв Җв Җ"], interval: 60 },
  "orbit": { frames: ["в ғ", "в ү", "в ҳ", "в °", "вў ", "вЈҖ", "вЎ„", "в Ҷ"], interval: 100 },
  "breathe": { frames: ["в Җ", "в Ӯ", "в Ң", "вЎ‘", "вў•", "вўқ", "вЈ«", "вЈҹ", "вЈҝ", "вЈҹ", "вЈ«", "вўқ", "вў•", "вЎ‘", "в Ң", "в Ӯ", "в Җ"], interval: 100 },
  "waverows": { frames: ["в –в үв үв ‘", "вЎ в –в үв ү", "вЈ вЎ в –в ү", "вЈ„вЈ вЎ в –", "в ўвЈ„вЈ вЎ ", "в ҷв ўвЈ„вЈ ", "в үв ҷв ўвЈ„", "в Ҡв үв ҷв ў", "в ңв Ҡв үв ҷ", "вЎӨв ңв Ҡв ү", "вЈҖвЎӨв ңв Ҡ", "вўӨвЈҖвЎӨв ң", "в ЈвўӨвЈҖвЎӨ", "в ‘в ЈвўӨвЈҖ", "в үв ‘в ЈвўӨ", "в Ӣв үв ‘в Ј"], interval: 90 },
  "checkerboard": { frames: ["вў•вў•вў•", "вЎӘвЎӘвЎӘ", "вўҠв ”вЎЎ", "вЎЎвўҠв ”"], interval: 250 },
  "helix": { frames: ["вўҢвЈүвўҺвЈү", "вЈүвЎұвЈүвЎұ", "вЈүвўҺвЈүвўҺ", "вЎұвЈүвЎұвЈү", "вўҺвЈүвўҺвЈү", "вЈүвЎұвЈүвЎұ", "вЈүвўҺвЈүвўҺ", "вЎұвЈүвЎұвЈү", "вўҺвЈүвўҺвЈү", "вЈүвЎұвЈүвЎұ", "вЈүвўҺвЈүвўҺ", "вЎұвЈүвЎұвЈү", "вўҺвЈүвўҺвЈү", "вЈүвЎұвЈүвЎұ", "вЈүвўҺвЈүвўҺ", "вЎұвЈүвЎұвЈү"], interval: 80 },
  "fillsweep": { frames: ["вЈҖвЈҖ", "вЈӨвЈӨ", "вЈ¶вЈ¶", "вЈҝвЈҝ", "вЈҝвЈҝ", "вЈҝвЈҝ", "вЈ¶вЈ¶", "вЈӨвЈӨ", "вЈҖвЈҖ", "в Җв Җ", "в Җв Җ"], interval: 100 },
  "diagswipe": { frames: ["в Ғв Җ", "в Ӣв Җ", "в ҹв Ғ", "вЎҝв Ӣ", "вЈҝв ҹ", "вЈҝвЎҝ", "вЈҝвЈҝ", "вЈҝвЈҝ", "вЈҫвЈҝ", "вЈҙвЈҝ", "вЈ вЈҫ", "вўҖвЈҙ", "в ҖвЈ ", "в ҖвўҖ", "в Җв Җ", "в Җв Җ"], interval: 60 }
};
const NATIVE_LOADERS = {
  "Circle": { css: `.circle-loader { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }`, html: `<div class="circle-loader"></div>` },
  "Dots": { css: `.dots-loader { display: flex; gap: 6px; align-items: center; }
.dots-loader span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: dot-bounce 0.6s ease-in-out infinite alternate; }
.dots-loader span:nth-child(2) { animation-delay: 0.2s; }
.dots-loader span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { to { transform: translateY(-12px); } }`, html: `<div class="dots-loader"><span></span><span></span><span></span></div>` },
  "Bars": { css: `.bars-loader { display: flex; gap: 2px; align-items: center; height: 28px; }
.bars-loader span { width: 4px; height: 6px; background: var(--accent); border-radius: 2px; animation: bar-grow 0.4s ease-in-out infinite alternate; }
.bars-loader span:nth-child(2) { animation-delay: 0.1s; }
.bars-loader span:nth-child(3) { animation-delay: 0.2s; }
.bars-loader span:nth-child(4) { animation-delay: 0.3s; }
.bars-loader span:nth-child(5) { animation-delay: 0.4s; }
@keyframes bar-grow { to { height: 28px; } }`, html: `<div class="bars-loader"><span></span><span></span><span></span><span></span><span></span></div>` },
  "Orbit": { css: `.orbit-loader { width: 44px; height: 44px; position: relative; }
.orbit-loader::before { content: ""; position: absolute; inset: 0; border: 1.5px solid var(--border); border-radius: 50%; }
.orbit-loader::after { content: ""; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin: -3px 0 0 -3px; transform-origin: -19px center; animation: orbit-spin 1s linear infinite; }
@keyframes orbit-spin { to { transform: rotate(360deg); } }`, html: `<div class="orbit-loader"></div>` },
  "Pulse": { css: `.pulse-loader { width: 40px; height: 40px; position: relative; display: flex; align-items: center; justify-content: center; }
.pulse-loader::before { content: ""; position: absolute; inset: 0; border: 2px solid var(--accent); border-radius: 50%; opacity: 0; animation: pulse-ring 1s ease-out infinite; }
.pulse-loader::after { content: ""; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }
@keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }`, html: `<div class="pulse-loader"></div>` },
  "Wave": { css: `.wave-loader { width: 60px; height: 20px; overflow: hidden; }
.wave-loader svg { width: 100%; height: 100%; }
.wave-loader path { stroke: var(--accent); stroke-width: 2; fill: none; animation: wave-shift 0.03s linear infinite; }`, html: `<div class="wave-loader"><svg viewBox="0 0 60 20" preserveAspectRatio="none"><path d="M0,10 Q15,0 30,10 T60,10" /></svg></div>` },
  "Gradient Ring": { css: `.gradient-ring { width: 44px; height: 44px; border-radius: 50%; background: conic-gradient(#5b9dd9, #c586c0, #d16969, #5b9dd9); -webkit-mask: radial-gradient(circle at center, transparent 55%, black 56%); mask: radial-gradient(circle at center, transparent 55%, black 56%); animation: spin 1s linear infinite; }`, html: `<div class="gradient-ring"></div>` },
  "Grid Flip": { css: `.grid-flip { display: grid; grid-template-columns: repeat(2, 10px); gap: 3px; }
.grid-flip span { width: 10px; height: 10px; background: var(--accent); border-radius: 2px; animation: grid-flip-anim 0.5s ease-in-out infinite alternate; }
.grid-flip span:nth-child(1) { animation-delay: 0s; }
.grid-flip span:nth-child(2) { animation-delay: 0.12s; }
.grid-flip span:nth-child(3) { animation-delay: 0.24s; }
.grid-flip span:nth-child(4) { animation-delay: 0.36s; }
@keyframes grid-flip-anim { to { transform: rotate(180deg) scale(0.8); } }`, html: `<div class="grid-flip"><span></span><span></span><span></span><span></span></div>` },
  "Infinity": { css: `.infinity-loader { width: 44px; height: 22px; }
.infinity-loader svg { width: 100%; height: 100%; }
.infinity-loader path { stroke: var(--accent); stroke-width: 2; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: infinity-draw 1.2s ease-in-out infinite alternate; }
@keyframes infinity-draw { to { stroke-dashoffset: 0; } }`, html: `<div class="infinity-loader"><svg viewBox="0 0 44 22"><path d="M11,11 C11,6 6,6 6,11 C6,16 11,16 11,11 C11,6 6,6 6,11 M11,11 C11,6 16,6 16,11 C16,16 11,16 11,11 C11,6 16,6 16,11" /></svg></div>` }
};
const HERMES_THINK = ["helix", "breathe", "orbit", "dna", "waverows", "snake", "pulse"];
const HERMES_TOOL = ["cascade", "scan", "diagswipe", "fillsweep", "rain", "columns", "sparkle"];

function getUnicodeCategory(name) {
  if (HERMES_THINK.includes(name)) return 'think';
  if (HERMES_TOOL.includes(name)) return 'tool';
  return 'other';
}

let currentTab = 'unicode';
let spinnerIntervals = [];

function clearIntervals() {
  spinnerIntervals.forEach(id => clearInterval(id));
  spinnerIntervals = [];
}

function buildCards() {
  clearIntervals();
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  const showPreview = document.getElementById('showPreview').checked;
  const dynCss = document.getElementById('dynamicCss');

  grid.innerHTML = '';
  dynCss.innerHTML = '';

  // Collect items based on tab
  let items = [];

  if (currentTab === 'unicode' || currentTab === 'all') {
    for (const [name, info] of Object.entries(SPINNERS)) {
      const cat = getUnicodeCategory(name);
      items.push({ name, type: 'unicode', cat, info });
    }
  }

  if (currentTab === 'native' || currentTab === 'all') {
    for (const [name, info] of Object.entries(NATIVE_LOADERS)) {
      items.push({ name, type: 'native', cat: 'native', info });
    }
  }

  // Filter
  items = items.filter(item => {
    if (!item.name.toLowerCase().includes(search)) return false;
    if (filter === 'all') return true;
    return item.cat === filter;
  });

  // Render
  for (const item of items) {
    const card = document.createElement('div');
    card.className = 'card';

    let badges = '';
    if (item.cat === 'think') badges = '<span class="badge badge-think">thinking</span>';
    else if (item.cat === 'tool') badges = '<span class="badge badge-tool">tool</span>';
    else if (item.cat === 'native') badges = '<span class="badge badge-native">native</span>';

    if (item.type === 'unicode') {
      const info = item.info;
      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${item.name}</span>
          <div class="card-badges">${badges}</div>
        </div>
        <div class="spinner-display" data-spinner="${item.name}"></div>
        <div class="card-meta">
          <span>${info.frames.length} frames</span>
          <span>${info.interval}ms</span>
        </div>
        ${showPreview ? `<div class="preview-line" data-preview="${item.name}"><span class="spinner-inline"></span> Generating assets...</div>` : ''}
      `;
      grid.appendChild(card);

      // Start animation
      let frame = 0;
      const display = card.querySelector('[data-spinner]');
      const preview = card.querySelector('[data-preview] .spinner-inline');
      const id = setInterval(() => {
        const f = info.frames[frame % info.frames.length];
        if (display) display.textContent = f;
        if (preview) preview.textContent = f;
        frame++;
      }, info.interval);
      spinnerIntervals.push(id);

    } else if (item.type === 'native') {
      const info = item.info;
      // Inject CSS (dedupe by using a class prefix)
      const cssClassName = item.name.toLowerCase().replace(/\s+/g, '-');
      dynCss.innerHTML += info.css;

      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${item.name}</span>
          <div class="card-badges">${badges}</div>
        </div>
        <div class="spinner-display">${info.html}</div>
        <div class="card-meta">
          <span>native SwiftUI</span>
          <span>CSS equiv.</span>
        </div>
        ${showPreview ? `<div class="preview-line"><span style="color:var(--accent)">${info.html}</span> Generating assets...</div>` : ''}
      `;
      grid.appendChild(card);
    }
  }
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    // Reset filter when switching tabs
    if (currentTab === 'native') {
      document.getElementById('filter').value = 'native';
    } else if (currentTab === 'unicode') {
      document.getElementById('filter').value = 'all';
    }
    buildCards();
  });
});

document.getElementById('search').addEventListener('input', buildCards);
document.getElementById('filter').addEventListener('change', buildCards);
document.getElementById('showPreview').addEventListener('change', buildCards);
buildCards();

// Update count
document.getElementById('totalCount').textContent = Object.keys(SPINNERS).length + Object.keys(NATIVE_LOADERS).length;
</script>
</body>
</html>
